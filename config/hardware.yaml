# CUMRAG Hardware Tier Definitions
# Reference: comprag-spec.md Hardware Matrix

hardware_tiers:
  v100:
    display_name: "NVIDIA V100 SXM2 32GB (in Dell T7820)"
    type: gpu
    vram: "32GB HBM2"
    ram: "48GB DDR4 + 384GB Optane"
    cpu: "Intel Xeon Gold 6230 (20C/40T)"
    software_stack:
      - "CUDA 12.x"
      - "llama.cpp (GGML_CUDA=1)"
    status: incoming
    notes: "Primary eval tier. Supports all models including 14B FP16."

  mi25:
    display_name: "AMD MI25 16GB"
    type: gpu
    vram: "16GB HBM"
    ram: "32GB DDR4"
    cpu: "TBD"
    software_stack:
      - "ROCm"
      - "llama.cpp (GGML_HIPBLAS=1)"
    status: available
    notes: "7-8B Q4/Q8, 14B Q4 (tight)."

  1660s:
    display_name: "NVIDIA 1660 Super 6GB"
    type: gpu
    vram: "6GB GDDR6"
    ram: "32GB DDR4"
    cpu: "Intel E5-2667 v4 (8C/16T)"
    software_stack:
      - "CUDA 12.x"
      - "llama.cpp (GGML_CUDA=1)"
    status: available
    notes: "3B and under, 7B Q4 very tight — may OOM."

  fpga:
    display_name: "Inspur FPGA board + 16GB SODIMM"
    type: fpga
    vram: "N/A"
    ram: "16GB DDR4"
    cpu: "N/A"
    software_stack:
      - "TBD (BitNet runtime)"
    status: planned
    notes: "BitNet 1.58-bit native only."

  cpu:
    display_name: "Intel E5-2667v4 + 32GB DDR4"
    type: cpu
    vram: "N/A"
    ram: "32GB DDR4"
    cpu: "Intel E5-2667 v4 (8C/16T)"
    software_stack:
      - "llama.cpp CPU (AVX2)"
    status: available
    notes: "7B Q4 primary, 14B Q4 if patient. ~2-5 tok/s."

  optane:
    display_name: "E5-2667v4 + Optane DCPMM 384GB"
    type: cpu
    vram: "N/A"
    ram: "384GB Optane (App Direct)"
    cpu: "Intel E5-2667 v4 (8C/16T)"
    software_stack:
      - "llama.cpp CPU (weights on Optane DAX)"
    status: available
    notes: "Weights mmap'd from Optane. ~300ns random access. 7B Q4 primary."
