retrieval:
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size_words: 300
  overlap_words: 64
  top_k: 5
  index_dir: "index/"

generation:
  # ALL LOCKED. No per-model overrides.
  temperature: 0.0
  max_tokens: 512
  seed: 42
  local_server_port: 5741

judge:
  primary:
    provider: "local"
    model_id: "c4ai-command-r-08-2024"
    model_path: "/mnt/data/comprag-models/c4ai-command-r-08-2024-Q4_K_M.gguf"
    temperature: 0.0
    max_tokens: 1024
  validation:
    provider: "anthropic"
    model_id: "claude-sonnet-4-6"
    sample_size: 100

scoring:
  framework: ragchecker

statistics:
  bootstrap_resamples: 1000
  confidence_level: 0.95
  capability_degradation_threshold: 0.30  # pass3 CU below this = degraded

datasets:
  rgb:
    source: "https://github.com/chen700564/RGB"
    subsets: [noise_robustness, negative_rejection, counterfactual]
    pass_policy:
      counterfactual: [pass1_baseline, pass2_loose, pass3_strict]
      default: [pass2_loose]
  # nq and halueval dropped — RGB alone provides sufficient signal
  # for the quantization-vs-faithfulness hypothesis.

judge_validation:
  sample_size: 500  # stratified across model matrix, run after production scoring
  agreement_threshold_kappa: 0.80  # required for CU; secondary metrics report raw agreement alongside kappa
  primary_judge: {provider: "local", model: "c4ai-command-r-v01", quant: "Q4_K_M", port: 5742}
  validation_judge: {provider: "anthropic", model_id: "claude-sonnet-4-6"}
