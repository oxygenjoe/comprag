retrieval:
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size_words: 300
  overlap_words: 64
  top_k: 5
  index_dir: "index/"

generation:
  # ALL LOCKED. No per-model overrides.
  temperature: 0.0
  max_tokens: 512
  seed: 42
  local_server_port: 8080

judge:
  primary:
    provider: "anthropic"
    model_id: "claude-opus-4-6"
    temperature: 0.0
    max_tokens: 1024
  agreement_judges:
    - provider: "openai"
      model_id: "gpt-5.4"
    - provider: "google"
      model_id: "gemini-3-flash-preview"

scoring:
  primary: ragchecker
  baseline: ragas

statistics:
  bootstrap_resamples: 1000
  confidence_level: 0.95
  capability_degradation_threshold: 0.30  # pass3 CU below this = degraded

datasets:
  rgb:
    source: "https://github.com/chen700564/RGB"
    subsets: [noise_robustness, negative_rejection, counterfactual]
    pass_policy:
      counterfactual: [pass1_baseline, pass2_loose, pass3_strict]
      default: [pass2_loose]
  nq:
    source: "huggingface:nq_open"
    subsets: [default]
    pass_policy:
      default: [pass2_loose]
  halueval:
    source: "https://github.com/RUCAIBox/HaluEval"
    subsets: [default]
    pass_policy:
      default: [pass2_loose]

judge_validation:
  sample_size: 100
  primary_arch_sample: 50
  secondary_arch_sample: 50
  agreement_threshold_kappa: 0.80
  judges:  # pairwise kappa computed for all pairs
    - {provider: "anthropic", model_id: "claude-opus-4-6"}
    - {provider: "anthropic", model_id: "claude-sonnet-4-6"}
    - {provider: "anthropic", model_id: "claude-haiku-4-5-20251001"}
    - {provider: "openai", model_id: "gpt-5.4"}
    - {provider: "google", model_id: "gemini-3-flash-preview"}
    - {provider: "deepseek", model_id: "deepseek-chat"}
    - {provider: "zhipu", model_id: "glm-5"}
