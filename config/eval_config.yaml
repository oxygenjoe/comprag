# CUMRAG Evaluation Configuration
# Reference: comprag-spec.md, comprag-claude-code-guide-v2.md
# All parameters locked across runs for reproducibility.

# Dataset paths (relative to project root)
datasets:
  rgb:
    path: "datasets/rgb"
    source: "https://github.com/chen700564/RGB"
    description: "Noise robustness, negative rejection, information integration, counterfactual robustness"
  nq:
    path: "datasets/nq"
    source: "huggingface:nq_open"
    description: "General RAG accuracy with human-labeled answers"
  halueval:
    path: "datasets/halueval"
    source: "https://github.com/RUCAIBox/HaluEval"
    description: "Hallucination detection with human labels"

# Retrieval parameters (constant across all runs)
retrieval:
  embedding_model: "all-MiniLM-L6-v2"
  embedding_dim: 384
  vector_store: "chromadb"
  # index_path: "index/"  # DEPRECATED: renamed to index_dir in v2
  index_dir: "index/"                  # ChromaDB persist directory
  chunk_size: 300  # Whitespace words, not BPE tokens. 300 words ≈ 400-500 BPE tokens.
  overlap: 64
  top_k: 5
  collections:
    rgb_noise_robustness: "auto"           # "auto" = computed from params at runtime
    rgb_negative_rejection: "auto"
    rgb_information_integration: "auto"
    rgb_counterfactual_robustness: "auto"
    nq_wiki: "auto"
    halueval: "auto"

# Generation parameters (locked across all runs)
generation:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 512
  seed: 42
  server_url: "http://localhost:8080"
  endpoint: "/v1/chat/completions"
  prompt_template: "config/prompt_template.txt"

# Evaluation frameworks
evaluation:
  frameworks:
    - ragas
    - ragchecker
  ragas_metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall
  ragchecker_metrics:
    - context_utilization
    - self_knowledge
    - noise_sensitivity
  # judge_model removed in v2 — see top-level 'judge' block below

# Judge model for RAGAS/RAGChecker scoring (local llama.cpp, NOT cloud API)
judge:
  model: "qwen2.5-14b-instruct"
  quant: "Q4_K_M"
  server_port: 8081          # DIFFERENT from generation server (8080)
  context_length: 8192       # Judge doesn't need full 32k — claims are short
  max_tokens: 1024
  temperature: 0.0
  # When judge model == eval model, override:
  self_judge_quant: "Q8_0"   # Use different quant to avoid circular eval

# Statistical requirements
statistics:
  min_runs: 3
  bootstrap_resamples: 1000
  confidence_level: 0.95
  ci_width_flag_threshold: 0.15  # Flag if CI width > 15% of mean

# Three-pass evaluation protocol
passes:
  pass1_baseline:
    template: "config/prompt_pass1_baseline.txt"
    include_context: false
  pass2_loose:
    template: "config/prompt_pass2_loose.txt"
    include_context: true
  pass3_strict:
    template: "config/prompt_pass3_strict.txt"
    include_context: true

# Pass policy: which passes to run per dataset subset
# "all" means [pass1_baseline, pass2_loose, pass3_strict]
pass_policy:
  rgb_counterfactual_robustness: all
  default: [pass2_loose]

# Output paths (relative to project root)
output:
  raw_results: "results/raw/"
  scored_results: "results/scored/"
  aggregated_results: "results/aggregated/"
  figures: "results/figures/"
  format: "jsonl"
