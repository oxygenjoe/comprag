# CUMRAG Evaluation Configuration
# Reference: cumrag-spec.md
# All parameters locked across runs for reproducibility.

# Dataset paths (relative to project root)
datasets:
  rgb:
    path: "datasets/rgb"
    source: "https://github.com/chen700564/RGB"
    description: "Noise robustness, negative rejection, information integration, counterfactual robustness"
  nq:
    path: "datasets/nq"
    source: "huggingface:nq_open"
    description: "General RAG accuracy with human-labeled answers"
  halueval:
    path: "datasets/halueval"
    source: "https://github.com/RUCAIBox/HaluEval"
    description: "Hallucination detection with human labels"

# Retrieval parameters (constant across all runs)
retrieval:
  embedding_model: "all-MiniLM-L6-v2"
  embedding_dim: 384
  vector_store: "chromadb"
  index_path: "index/"
  chunk_size: 300  # Whitespace words, not BPE tokens. 300 words ≈ 400-500 BPE tokens.
  overlap: 64
  top_k: 5

# Generation parameters (locked across all runs)
generation:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 512
  seed: 42
  server_url: "http://localhost:8080"
  endpoint: "/v1/chat/completions"
  prompt_template: "config/prompt_template.txt"

# Evaluation frameworks
evaluation:
  frameworks:
    - ragas
    - ragchecker
  ragas_metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall
  ragchecker_metrics:
    - context_utilization
    - self_knowledge
    - noise_sensitivity
  judge_model: "claude"  # or "gpt-4"

# Statistical requirements
statistics:
  min_runs: 3
  bootstrap_resamples: 1000
  confidence_level: 0.95
  ci_width_flag_threshold: 0.15  # Flag if CI width > 15% of mean

# Output paths (relative to project root)
output:
  raw_results: "results/raw/"
  aggregated_results: "results/aggregated/"
  figures: "results/figures/"
  format: "jsonl"
